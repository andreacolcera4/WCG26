<script>
fetch("https://api.sheetbest.com/sheets/0be25ba0-595f-4b5c-a4ff-0c1720066212")
  .then(res => res.json())
  .then(data => {

    console.log(data); // debug

    let html = "<h2>Classifica</h2>";

    data.forEach(r => {
      html += `<p>${JSON.stringify(r)}</p>`;
    });

    document.getElementById("output").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("output").innerHTML = "Errore: " + err;
  });
</script>
