<body>

<h1>Classifica</h1>
<div id="output">Caricamento...</div>

<script>
fetch("https://api.sheetbest.com/sheets/0be25ba0-595f-4b5c-a4ff-0c1720066212")
  .then(res => res.json())
  .then(data => {
    let html = "";

    data.forEach(r => {
      html += `<p>${r.Nome} - ${r.Punti}</p>`;
    });

    document.getElementById("output").innerHTML = html;
  });
</script>

</body>
</html>
